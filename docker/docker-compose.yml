version: '3.9'

services:
    app:
        build:
            context: ./php
        container_name: backend
        working_dir: /var/www/html
        volumes:
            - ../backend:/var/www/html
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
        depends_on:
            - db
        networks:
            - app-network

    nginx:
        image: nginx:latest
        container_name: nginx
        ports:
            - "80:80"
        volumes:
            - ../backend:/var/www/html
            - ./nginx/conf.d:/etc/nginx/conf.d
        depends_on:
            - app
        networks:
            - app-network

    redis:
        image: redis:alpine
        container_name: redis
        ports:
            - "6379:6379"
        networks:
            - app-network

    db:
        image: mysql:8.0
        container_name: diplom_db
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: diplom
            MYSQL_PASSWORD: root
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - app-network
        command:
            - --default-authentication-plugin=mysql_native_password
            - --innodb-flush-method=O_DIRECT
            - --innodb-buffer-pool-size=256M
            - --innodb-log-file-size=128M
            - --max_connections=200
            - --key_buffer_size=64M
            - --table_open_cache=400
            - --thread_cache_size=128

volumes:
    db_data:

networks:
    app-network:
